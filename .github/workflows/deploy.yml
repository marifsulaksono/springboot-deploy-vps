name: CI/CD - Build & Deploy

concurrency:
  group: deploy-mentor
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: spring-app-mentor
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      APP_DIR: /home/backend/spring-app/mentor

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build application
        run: ./mvnw -B clean package -DskipTests

      # 🐳 Docker Login
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🐳 Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      # 📦 Copy compose
      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "${{ env.APP_DIR }}"
          overwrite: true

      # 🚀 Deploy
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}

            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export IMAGE_TAG=${{ github.sha }}

            echo "🚀 Deploying version: $IMAGE_TAG"

            if [ ! -f .env ]; then
              echo "❌ Missing .env in ${{ env.APP_DIR }}"
              exit 1
            fi

            docker compose pull
            docker compose up -d --remove-orphans

            echo "📊 Status:"
            docker compose ps

            APP_PORT=$(grep -E '^APP_PORT=' .env | tail -n1 | cut -d '=' -f2)
            APP_PORT=${APP_PORT:-9000}

            for i in {1..10}; do
              if curl -fsS "http://localhost:${APP_PORT}/actuator/health" > /dev/null; then
                echo "✅ App is healthy on port ${APP_PORT}"
                break
              fi
              echo "⏳ Waiting for app health..."
              sleep 3
            done

            if ! curl -fsS "http://localhost:${APP_PORT}/actuator/health" > /dev/null; then
              echo "❌ Health check failed"
              docker compose logs --tail=100
              exit 1
            fi

            echo "📜 Logs:"
            docker compose logs --tail=20
